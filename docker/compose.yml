services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: semanticcache
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports: ["5432:5432"]
    volumes: ["./init.sql:/docker-entrypoint-initdb.d/init.sql"]
